<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Chat Random Modern</title>
    <style>
        /* Pengaturan Dasar & Warna Tema Gelap */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Wadah Utama Aplikasi (Kotak Chat) */
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Bagian Atas / Header */
        .chat-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.07);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981; /* Hijau aktif */
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Area Pesan Chat */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Gaya Balon Chat */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Chat dari Kita (Kanan) */
        .message.me {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Chat dari Orang Lain (Kiri) */
        .message.stranger {
            background: rgba(255, 255, 255, 0.15);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Sistem Info (Tengah) */
        .message.system {
            background: transparent;
            color: #94a3b8;
            align-self: center;
            text-align: center;
            font-style: italic;
            font-size: 12px;
        }

        /* Bagian Bawah / Input Tempat Mengetik */
        .chat-input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .chat-input::placeholder {
            color: #94a3b8;
        }

        /* Tombol-Tombol */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-send {
            background: #3b82f6;
            color: white;
        }

        .btn-send:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .btn-next {
            background: #ef4444;
            color: white;
            font-size: 12px;
        }

        .btn-next:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div><strong>Chat Random 💬</strong></div>
            <div style="font-size: 13px; color: #cbd5e1;">
                <span class="status-dot"></span>Online
            </div>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message system">Mencari pasangan chat...</div>
            <div class="message stranger">Halo! Salam kenal ya.</div>
            <div class="message me">Halo juga! Kamu dari mana?</div>
        </div>

        <div class="chat-input-area">
            <button class="btn btn-next">Skap / Next</button>
            <input type="text" class="chat-input" id="messageInput" placeholder="Ketik pesan di sini...">
            <button class="btn btn-send">Kirim</button>
        </div>
    </div>

</body>
</html>
